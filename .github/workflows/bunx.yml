name: bunx

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 0 * * *' # every day at 00:00 UTC
  workflow_dispatch: # allow manual triggering

jobs:
  bunx:
    runs-on: ubuntu-latest
    steps:
      - uses: oven-sh/setup-bun@v2
      - name: Download published package
        run: |
          npm pack scrabble-solver@latest
          mkdir work-dir
          tar -xzf scrabble-solver-*.tgz -C work-dir --strip-components=1
      - run: bun install --frozen-lockfile
        working-directory: work-dir
      - uses: cypress-io/github-action@v7
        with:
          install: false
          build: bun add --global scrabble-solver@latest
          start: scrabble-solver
          wait-on: 'http://localhost:3333'
          working-directory: work-dir
        env:
          CYPRESS_BASE_URL: http://localhost:3333
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: cypress-screenshots
          path: work-dir/cypress/screenshots
          if-no-files-found: ignore
