name: Format

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  oxfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run format
        env:
          CI: true
