name: Unit tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - uses: oven-sh/setup-bun@v2
      - run: npm ci
      - run: npm run build
      - run: npm run test-unit
        env:
          CI: true
