name: Lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  oxlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run lint
        env:
          CI: true
