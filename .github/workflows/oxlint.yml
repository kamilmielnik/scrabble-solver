name: Oxlint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  oxlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - run: npm ci
      - run: npm run build
      - run: npm run lint
        env:
          CI: true
